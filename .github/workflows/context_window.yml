name: 24h上下文窗口监控器

# 1. 触发条件 (When)
on:
  schedule:
    # 国际标准时间 (UTC)，每小时执行一次。
    # 0 * * * * 表示每个小时的第0分钟运行
    - cron: '0 * * * *'
  workflow_dispatch: # 允许在 GitHub 页面上点击 "Run workflow" 手动运行

# 2. 运行环境 (Where)
jobs:
  check_models:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 虚拟机

    # 3. 具体动作 (What)
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖库
        run: pip install requests

      - name: 运行监控脚本
        env:
         
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python monitor.py
